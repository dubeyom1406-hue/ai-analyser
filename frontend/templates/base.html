<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SalesCast AI{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-text">SalesCast</span>
    <span class="logo-badge">AI</span>
  </div>
  <ul class="nav-links">
    <li><a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
      <span class="nav-icon">📊</span> Dashboard
    </a></li>
    <li><a href="/forecast" class="nav-link {% if request.path == '/forecast' %}active{% endif %}">
      <span class="nav-icon">🔮</span> Forecast
    </a></li>
    <li><a href="/products" class="nav-link {% if request.path == '/products' %}active{% endif %}">
      <span class="nav-icon">📦</span> Products
    </a></li>
    <li><a href="/upload" class="nav-link {% if request.path == '/upload' %}active{% endif %}">
      <span class="nav-icon">📁</span> Upload Data
    </a></li>
  </ul>
  <div class="sidebar-status">
    <div class="status-dot"></div>
    <span>System Online</span>
  </div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
    <p class="page-sub">{% block page_sub %}{% endblock %}</p>
  </div>
  {% block content %}{% endblock %}
</main>

<script src="/static/js/api.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
